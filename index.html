<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- iPad Optimization: Prevents accidental zooming on double taps -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oral Exam Trainer 9B</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Small styling tweaks for iPad touch targets */
        button { touch-action: manipulation; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-indigo-200">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Helper Component for Icons ---
        const Icon = ({ name, size = 24, className = "", weight = "regular" }) => (
            <i className={`ph ${weight === 'fill' ? 'ph-fill' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        // --- STRUKTURIERTE JOB-DATENBANK ---
        const JOB_CATEGORIES = [
          { 
            id: 'edu-social', 
            title: 'Education & Social Care', 
            iconKey: 'Users', 
            gradient: 'from-blue-500 to-cyan-500', 
            text: 'text-blue-600',
            jobs: ['Teacher', 'Kindergarten Teacher', 'Babysitter', 'Social Worker', 'Speech Therapist'] 
          },
          { 
            id: 'health-med', 
            title: 'Healthcare & Medicine', 
            iconKey: 'Stethoscope', 
            gradient: 'from-rose-500 to-orange-500', 
            text: 'text-rose-600',
            jobs: ['Nurse', 'Dentist', 'Surgeon', 'Physical Therapist', 'Pharmacist'] 
          },
          { 
            id: 'service-tour', 
            title: 'Tourism & Hospitality', 
            iconKey: 'Plane', 
            gradient: 'from-emerald-500 to-teal-500', 
            text: 'text-emerald-600',
            jobs: ['Landscaper / Gardener', 'Waiter / Waitress', 'Chef / Cook', 'Housekeeper', 'Tour Guide'] 
          },
          { 
            id: 'tech-eng', 
            title: 'Tech & Engineering', 
            iconKey: 'Cpu', 
            gradient: 'from-violet-600 to-indigo-500', 
            text: 'text-violet-600',
            jobs: ['IT Support Specialist', 'Astronaut', 'Mechanic', 'Engineer', 'Software Developer'] 
          },
          { 
            id: 'bus-fin', 
            title: 'Business & Finance', 
            iconKey: 'TrendingUp', 
            gradient: 'from-amber-500 to-yellow-500', 
            text: 'text-amber-600',
            jobs: ['Manager', 'CEO (Chief Executive Officer)', 'Entrepreneur', 'Salesperson', 'Tax Accountant', 'Bookkeeper'] 
          },
          { 
            id: 'creative-media', 
            title: 'Creative & Media', 
            iconKey: 'Palette', 
            gradient: 'from-pink-500 to-rose-500', 
            text: 'text-pink-600',
            jobs: ['Content Creator / Influencer', 'Actor', 'Fashion Designer', 'Musician', 'Film Director'] 
          }
        ];

        const FLAT_JOB_LIST = JOB_CATEGORIES.flatMap(cat => 
          cat.jobs.map(job => ({ job, categoryTitle: cat.title, gradient: cat.gradient }))
        );

        const FOLLOW_UP_QUESTIONS = [
         
        ];

        const TASK_INSTRUCTIONS = {
          part1: {
            intro: "Present yourself briefly and talk about your connection to the world of work.\nInclude the following aspects:",
            bullets: [
              "Start with some key facts about yourself.",
              "Describe your personal skills and qualities.",
              "Explain which field of work you are interested in and how it relates to your personal skillset.",
              "Talk about whether you already have work experience in this field of work."
            ],
            outro: "",
            targetTime: 120 
          },
          part2: {
            intro: "You and your partner want to apply for a holiday job. Each of you received a job card with a specific position. You meet up to help each other prepare for the upcoming interviews.\nDiscuss:",
            bullets: [
              "What you plan to say.",
              "What tasks and responsibilities your job might include.",
              "Which skills or qualities are important.",
              "What you expect from this job (e.g. working hours, teamwork, challenges ...)."
            ],
            outro: "Make sure to have a real conversation: ask questions, react to what your partner says and keep the dialogue going naturally.",
            targetTime: 300 
          },
          part3: {
            intro: "After your conversation, each of you will answer two spontaneous questions from your teacher. These questions will give you the chance to show how well you can respond spontaneously and extend your answers.",
            bullets: [],
            outro: "Listen carefully to the teacher's questions. Give detailed answers and explain your reasons.",
            targetTime: 180 
          }
        };

        const CONTENT_TASKS = {
          part1: ["Key facts about yourself", "Personal skills and qualities", "Field of interest", "Relation to skillset", "Work experience"],
          part2: ["Planned pitch", "Tasks and responsibilities", "Skills or qualities", "Expectations (hours, etc.)"],
          part3: ["Answer Question 1 in detail", "Answer Question 2 in detail", "Reacted spontaneously", "Gave reasons for opinion"]
        };

        const ICON_MAP = { 
            Users: 'users', 
            Stethoscope: 'stethoscope', 
            Plane: 'airplane', 
            Cpu: 'cpu', 
            TrendingUp: 'trend-up', 
            Palette: 'palette' 
        };

        function App() {
          const [viewMode, setViewMode] = useState('exam'); 
          const [simMode, setSimMode] = useState(null); 
          const [checkedContent, setCheckedContent] = useState({});
          const [timeElapsed, setTimeElapsed] = useState(0);
          const [timerActive, setTimerActive] = useState(false);
          
          const [assignedJob, setAssignedJob] = useState(null);
          const [isDrawingJob, setIsDrawingJob] = useState(false);
          const [assignedQuestions, setAssignedQuestions] = useState([]);
          const [isDrawingQuestions, setIsDrawingQuestions] = useState(false);

          useEffect(() => {
            let interval = null;
            if (timerActive) {
              interval = setInterval(() => setTimeElapsed(t => t + 1), 1000);
            }
            return () => clearInterval(interval);
          }, [timerActive]);

          const formatTime = (s) => {
            const mins = Math.floor(s / 60);
            const secs = s % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
          };

          const getProgressColor = (elapsed, target) => {
            const ratio = elapsed / target;
            if (ratio <= 0.5) return 'bg-emerald-500 shadow-emerald-200';
            if (ratio <= 0.8) return 'bg-yellow-400 shadow-yellow-100';
            if (ratio <= 1.0) return 'bg-orange-500 shadow-orange-100';
            return 'bg-rose-600 shadow-rose-200 animate-pulse';
          };

          const runPrepTool = (mode) => {
            setSimMode(mode);
            setCheckedContent({});
            setTimerActive(false);
            setTimeElapsed(0);
            if (mode !== 'part2') setAssignedJob(null);
            if (mode !== 'part3') setAssignedQuestions([]);
          };

          const drawRandomJob = () => {
            setIsDrawingJob(true);
            setAssignedJob(null);
            setTimeout(() => {
              const randomIndex = Math.floor(Math.random() * FLAT_JOB_LIST.length);
              setAssignedJob(FLAT_JOB_LIST[randomIndex]);
              setIsDrawingJob(false);
            }, 600);
          };

          const drawRandomQuestions = () => {
            setIsDrawingQuestions(true);
            setAssignedQuestions([]);
            setTimeout(() => {
              const shuffled = [...FOLLOW_UP_QUESTIONS].sort(() => 0.5 - Math.random());
              setAssignedQuestions(shuffled.slice(0, 2));
              setIsDrawingQuestions(false);
            }, 600);
          };

          const renderCategoryIcon = (iconKey, size = 24, className = "") => {
            const name = ICON_MAP[iconKey] || 'briefcase';
            return <Icon name={name} size={size} className={className} />;
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-20">
              
              <header className="sticky top-0 z-50 bg-white border-b border-slate-200 px-6 py-4 shadow-sm">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row gap-6 justify-between items-center">
                  <div className="flex items-center gap-4">
                    <div className="bg-indigo-600 p-2.5 rounded-xl shadow-lg">
                      <Icon name="target" className="text-white" size={24} />
                    </div>
                    <div>
                      <h1 className="text-2xl font-black text-slate-900 tracking-tight">EXAM PREP <span className="text-indigo-600">9B</span></h1>
                      <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Oral Exam Trainer</p>
                    </div>
                  </div>
                  
                  <nav className="flex bg-slate-100 p-1 rounded-2xl border border-slate-200">
                    <button 
                        onClick={() => { setViewMode('exam'); setSimMode(null); }}
                        className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-[11px] font-black transition-all ${viewMode === 'exam' ? 'bg-white text-indigo-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                        <Icon name="shuffle" size={16} /> EXAM HUB
                    </button>
                    <button 
                        onClick={() => { setViewMode('network'); setSimMode(null); }}
                        className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-[11px] font-black transition-all ${viewMode === 'network' ? 'bg-white text-indigo-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                        <Icon name="graph" size={16} /> JOB NETWORK
                    </button>
                  </nav>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-6 py-12">
                
                {viewMode === 'network' ? (
                  <div className="py-4 space-y-16 animate-in fade-in duration-500">
                    <div className="text-center max-w-3xl mx-auto">
                       <h2 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter mb-4 uppercase">The Job Network</h2>
                       <p className="text-slate-500 italic">Explore all professional fields and job roles relevant for the exam.</p>
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-16">
                      {JOB_CATEGORIES.map(category => (
                        <div key={category.id} className="flex flex-col items-center lg:items-start group">
                          <div className={`px-8 md:px-10 py-5 rounded-3xl bg-gradient-to-r ${category.gradient} text-white font-black shadow-lg flex items-center gap-4 transition-transform group-hover:scale-105`}>
                            {renderCategoryIcon(category.iconKey, 24)}
                            <span className="text-base md:text-lg uppercase text-center md:text-left">{category.title}</span>
                          </div>
                          <div className="w-px h-10 bg-gradient-to-b from-slate-200 to-transparent lg:ml-12" />
                          <div className="flex flex-wrap justify-center lg:justify-start gap-3 lg:ml-6">
                            {category.jobs.map((job, i) => (
                              <div key={i} className={`px-5 py-3 bg-white border border-slate-200 rounded-2xl font-bold text-xs shadow-sm hover:border-indigo-300 transition-colors lowercase ${category.text}`}>
                                {job}
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                ) : (
                  
                  <div className="space-y-12 animate-in fade-in duration-500">
                    <div className="text-center">
                       <h2 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter mb-4 uppercase">EXAM HUB</h2>
                       <p className="text-slate-500 italic">Select a part to practice with the official task sheet instructions.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                         <button onClick={() => runPrepTool('part1')} className={`bg-white relative p-8 md:p-10 rounded-[2.5rem] border-2 transition-all flex flex-col items-center gap-4 ${simMode === 'part1' ? 'border-indigo-500 ring-4 ring-indigo-50 shadow-xl' : 'border-slate-200 hover:border-indigo-300 shadow-sm'}`}>
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black text-slate-500 border border-slate-200">~ 2 min</div>
                            <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-indigo-600"><Icon name="user" size={32} /></div>
                            <div className="text-center">
                              <div className="text-xs font-black text-indigo-600 uppercase tracking-widest">PART 1</div>
                              <div className="text-xl font-black text-slate-900">Introducing yourself</div>
                            </div>
                         </button>

                         <button onClick={() => runPrepTool('part2')} className={`bg-white relative p-8 md:p-10 rounded-[2.5rem] border-2 transition-all flex flex-col items-center gap-4 ${simMode === 'part2' ? 'border-indigo-500 ring-4 ring-indigo-50 shadow-xl' : 'border-slate-200 hover:border-indigo-300 shadow-sm'}`}>
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black text-slate-500 border border-slate-200">~ 3-5 min</div>
                            <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-indigo-600"><Icon name="briefcase" size={32} /></div>
                            <div className="text-center">
                              <div className="text-xs font-black text-indigo-600 uppercase tracking-widest">PART 2</div>
                              <div className="text-xl font-black text-slate-900">Preparing for a holiday job</div>
                            </div>
                         </button>

                         <button onClick={() => runPrepTool('part3')} className={`bg-white relative p-8 md:p-10 rounded-[2.5rem] border-2 transition-all flex flex-col items-center gap-4 ${simMode === 'part3' ? 'border-indigo-500 ring-4 ring-indigo-50 shadow-xl' : 'border-slate-200 hover:border-indigo-300 shadow-sm'}`}>
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black text-slate-500 border border-slate-200">~ 2-3 min</div>
                            <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-indigo-600"><Icon name="chat-circle" size={32} /></div>
                            <div className="text-center">
                              <div className="text-xs font-black text-indigo-600 uppercase tracking-widest">PART 3</div>
                              <div className="text-xl font-black text-slate-900">Follow-up questions</div>
                            </div>
                         </button>
                    </div>

                    {simMode && (
                      <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in zoom-in-95 duration-500">
                        
                        <div className="lg:col-span-2 space-y-8">
                          
                          {simMode === 'part2' && (
                            <div className="bg-white rounded-[3rem] p-8 md:p-10 border border-slate-200 shadow-sm flex flex-col sm:flex-row items-center gap-8 relative overflow-hidden">
                              <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-indigo-500 to-purple-500"></div>
                              <div className="w-20 h-20 shrink-0 bg-indigo-50 rounded-[2rem] flex items-center justify-center text-indigo-600">
                                <Icon name="dice-five" size={40} />
                              </div>
                              <div className="flex-1 text-center sm:text-left">
                                <h3 className="text-xl font-black text-slate-900 uppercase tracking-tight mb-2">Draw your Job Card</h3>
                                {assignedJob ? (
                                  <div className={`bg-gradient-to-r ${assignedJob.gradient} text-white p-5 rounded-2xl shadow-lg animate-in fade-in slide-in-from-bottom-4`}>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-white/80 flex items-center gap-1 sm:justify-start justify-center mb-1">
                                      <Icon name="sparkle" size={12}/> Field: {assignedJob.categoryTitle}
                                    </span>
                                    <span className="font-bold text-xl">{assignedJob.job}</span>
                                  </div>
                                ) : (
                                  <p className="text-slate-500 text-sm mb-4">Click the button to draw a random job card from the database for this exam part.</p>
                                )}
                              </div>
                              <button 
                                onClick={drawRandomJob}
                                disabled={isDrawingJob}
                                className="shrink-0 bg-indigo-600 text-white px-6 py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all disabled:opacity-50 disabled:hover:translate-y-0"
                              >
                                {isDrawingJob ? "Drawing..." : assignedJob ? "Draw Again" : "Draw Card"}
                              </button>
                            </div>
                          )}

                          {simMode === 'part3' && (
                            <div className="bg-white rounded-[3rem] p-8 md:p-10 border border-slate-200 shadow-sm flex flex-col sm:flex-row items-center gap-8 relative overflow-hidden">
                              <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-rose-500 to-orange-500"></div>
                              <div className="w-20 h-20 shrink-0 bg-rose-50 rounded-[2rem] flex items-center justify-center text-rose-600">
                                <Icon name="info" size={40} />
                              </div>
                              <div className="flex-1 text-center sm:text-left">
                                <h3 className="text-xl font-black text-slate-900 uppercase tracking-tight mb-2">Draw Follow-Up Questions</h3>
                                {assignedQuestions.length > 0 ? (
                                  <div className="space-y-3 mt-4 animate-in fade-in slide-in-from-bottom-4">
                                    {assignedQuestions.map((q, index) => (
                                      <div key={index} className="bg-rose-50 border border-rose-100 text-slate-800 p-4 rounded-2xl shadow-sm text-sm sm:text-base font-medium flex gap-3">
                                        <span className="text-rose-500 font-black">Q{index + 1}:</span> {q}
                                      </div>
                                    ))}
                                  </div>
                                ) : (
                                  <p className="text-slate-500 text-sm mb-4">Draw 2 random questions from the official list to practice answering spontaneously.</p>
                                )}
                              </div>
                              <button 
                                onClick={drawRandomQuestions}
                                disabled={isDrawingQuestions}
                                className="shrink-0 bg-rose-600 text-white px-6 py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-rose-200 hover:bg-rose-700 hover:-translate-y-1 transition-all disabled:opacity-50 disabled:hover:translate-y-0"
                              >
                                {isDrawingQuestions ? "Drawing..." : assignedQuestions.length > 0 ? "Draw Again" : "Draw Questions"}
                              </button>
                            </div>
                          )}

                          <div className="bg-white rounded-[3rem] shadow-xl border border-slate-200 overflow-hidden relative">
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-500 to-fuchsia-500"></div>
                            <div className="p-8 md:p-14">
                              <div className="flex items-center gap-3 mb-6 text-indigo-600 font-black text-[10px] uppercase tracking-widest">
                                <Icon name="file-text" size={16} /> Official Task Description
                              </div>
                              <div className="text-slate-700 text-base md:text-lg leading-relaxed p-6 md:p-8 bg-slate-50 rounded-3xl border border-slate-100">
                                <p className="whitespace-pre-line font-normal">{TASK_INSTRUCTIONS[simMode].intro}</p>
                                {TASK_INSTRUCTIONS[simMode].bullets.length > 0 && (
                                  <ul className="list-disc pl-6 mt-4 space-y-3 font-normal text-slate-600">
                                    {TASK_INSTRUCTIONS[simMode].bullets.map((b, i) => <li key={i}>{b}</li>)}
                                  </ul>
                                )}
                                {TASK_INSTRUCTIONS[simMode].outro && (
                                  <p className="mt-8 pt-4 border-t border-slate-200 italic text-slate-500 text-sm md:text-base">{TASK_INSTRUCTIONS[simMode].outro}</p>
                                )}
                              </div>
                            </div>
                          </div>
                        </div>

                        <div className="space-y-8">
                          
                          <div className="bg-white rounded-[2.5rem] p-8 md:p-10 border border-slate-200 shadow-xl flex flex-col items-center">
                            <div className="text-slate-400 font-black text-[10px] uppercase tracking-widest mb-4 flex items-center gap-2">
                              <Icon name="clock" size={16} /> Practice Stopwatch
                            </div>
                            <div className="text-5xl md:text-6xl font-mono font-black text-slate-900 mb-6">{formatTime(timeElapsed)}</div>
                            
                            <div className="w-full mb-8">
                              <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden border border-slate-50">
                                <div 
                                  className={`h-full transition-all duration-1000 ease-linear shadow-sm ${getProgressColor(timeElapsed, TASK_INSTRUCTIONS[simMode].targetTime)}`}
                                  style={{ width: `${Math.min((timeElapsed / TASK_INSTRUCTIONS[simMode].targetTime) * 100, 100)}%` }}
                                />
                              </div>
                              <div className="flex justify-between mt-2 text-[8px] font-black text-slate-300 uppercase tracking-widest">
                                <span>Start</span>
                                <span>Target Time</span>
                              </div>
                            </div>

                            <div className="flex gap-2 w-full">
                              <button 
                                onClick={() => setTimerActive(!timerActive)}
                                className={`flex-1 py-4 rounded-2xl flex items-center justify-center gap-2 font-black text-[10px] uppercase tracking-widest transition-all ${timerActive ? 'bg-slate-200 text-slate-700' : 'bg-indigo-600 text-white shadow-lg shadow-indigo-100 hover:bg-indigo-700'}`}
                              >
                                {timerActive ? <><Icon name="square" size={14} weight="fill" /> Pause</> : <><Icon name="play" size={14} weight="fill" /> Start</>}
                              </button>
                              <button 
                                onClick={() => { setTimerActive(false); setTimeElapsed(0); }}
                                className="bg-slate-100 text-slate-500 p-4 rounded-2xl hover:bg-slate-200"
                              >
                                <Icon name="arrow-counter-clockwise" size={16} />
                              </button>
                            </div>
                          </div>

                          <div className="bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-lg">
                            <div className="text-indigo-600 font-black text-[10px] uppercase tracking-widest mb-6 flex items-center gap-2">
                              <Icon name="clipboard-text" size={18} /> Assessment Grid
                            </div>
                            <div className="space-y-4">
                              {CONTENT_TASKS[simMode].map((task, idx) => (
                                <div key={idx} className="flex items-start gap-4 cursor-pointer group" onClick={() => setCheckedContent(p => ({...p, [idx]: !p[idx]}))}>
                                  <div className={`shrink-0 mt-0.5 w-6 h-6 rounded-lg flex items-center justify-center transition-all ${checkedContent[idx] ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-100' : 'bg-slate-100 text-slate-300 group-hover:bg-slate-200'}`}>
                                    {checkedContent[idx] ? <Icon name="check" size={16} /> : <div className="w-1.5 h-1.5 rounded-full bg-current" />}
                                  </div>
                                  <span className={`text-sm font-bold leading-tight transition-all ${checkedContent[idx] ? 'text-slate-300 line-through' : 'text-slate-600'}`}>{task}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </main>

              <footer className="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-md border-t border-slate-200 py-3 px-6 z-40">
                <div className="max-w-7xl mx-auto flex justify-between items-center text-[10px] font-black text-slate-400 uppercase tracking-widest">
                  <div className="flex gap-2 items-center text-slate-400">
                    <Icon name="lightning" size={10} className="text-indigo-500" /> English Oral Exam Prep (Standalone)
                  </div>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
